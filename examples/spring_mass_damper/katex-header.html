<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"
  integrity="sha512-LQNxIMR5rXv7o+b1l8+N1EZMfhG7iFZ9HhnbJkTp4zjNr5Wvst75AqUeFDxeRUa7l5vEDyUiAip//r+EFLLCyA=="

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"
  integrity="sha512-iWiuBS5nt6r60fCz26Nd0Zqe0nbk1ZTIQbl3Kv7kYsX+yKMUFHzjaH2+AnM6vp2Xs+gNmaBAVWJjSmuPw76Efg=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    console.log("DOMContentLoaded");

    // 1. Render Block Math (```math)
    document.querySelectorAll("pre.language-math code").forEach(function (block) {
      console.log("GOT HERE");
      var wrapper = document.createElement("div");
      katex.render(block.textContent, wrapper, {displayMode: true, throwOnError: false});
      //block.parentElement.replaceWith(wrapper);
      // Want to exchange it for <div class="example-wrap">
      const parent_parent = block.parentElement.parentElement.replaceWith(wrapper);
    });

    // 2. Render Inline Math (`$...$`)
    document.querySelectorAll("code").forEach(function (block) {
      // Ignore normal code blocks inside <pre> tags
      if (block.parentElement.tagName === "PRE") return;

      var text = block.textContent;
      // Strictly target code spans that begin and end with $
      if (text.startsWith("$") && text.endsWith("$") && text.length > 1) {
        var math = text.substring(1, text.length - 1);
        var span = document.createElement("span");
        katex.render(math, span, {displayMode: false, throwOnError: false});
        block.replaceWith(span);
      }
    });
  });
</script>
